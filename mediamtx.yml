# MediaMTX (rtsp-simple-server) 配置文件
# 用于 RTSP → WebRTC/HLS 转换
# 
# 部署方式:
#   docker run -d --name mediamtx --network host \
#     -v $PWD/mediamtx.yml:/mediamtx.yml \
#     bluenviron/mediamtx
#
# 或直接下载二进制:
#   wget https://github.com/bluenviron/mediamtx/releases/latest/download/mediamtx_linux_amd64.tar.gz
#   tar xzf mediamtx_linux_amd64.tar.gz
#   ./mediamtx

# 全局设置
logLevel: info
logDestinations: [stdout]
logFile: mediamtx.log

# API 设置 (用于动态管理路径)
api: yes
apiAddress: 127.0.0.1:9997

# RTSP 服务 (接收推流和客户端播放)
rtspDisable: no
rtspAddress: :8554
protocols: [tcp]

# RTMP 服务 (可选，用于兼容)
rtmpDisable: no
rtmpAddress: :1935

# HLS 服务 (供 Web 前端播放)
hlsDisable: no
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsVariant: lowLatency

# WebRTC 服务 (供 Web 前端低延迟播放)
webrtcDisable: no
webrtcAddress: :8889
webrtcAllowOrigin: '*'
# 必须设置公网 IP，否则浏览器无法建立 WebRTC 连接
webrtcAdditionalHosts: ["106.15.53.24"]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# 路径默认设置
paths:
  # 允许推流到任意路径
  'live/.*':
    source: publisher
    sourceOnDemand: no
    sourceOnDisconnect: no
  # 也可以发布到根级别
  '~.*':
    source: publisher
    sourceOnDemand: no
    sourceOnDisconnect: no
